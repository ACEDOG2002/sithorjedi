<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sith vs Jedi: Global War</title>
    <style>
        /* --- 1. HYPERSPACE STYLES --- */
        body {
            margin: 0; padding: 0; min-height: 100vh; color: white;
            font-family: 'Segoe UI', sans-serif; display: flex;
            flex-direction: column; align-items: center; background: #000;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 3px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 3px);
            background-size: 550px 550px, 350px 350px;
            animation: hyperspace 8s linear infinite;
        }
        @keyframes hyperspace { from { background-position: 0 0; } to { background-position: 550px 550px; } }
        
        h1 { color: #ffe81f; text-transform: uppercase; letter-spacing: 5px; text-shadow: 0 0 20px #ffe81f; margin-top: 40px; }
        
        .main-stage { display: flex; gap: 30px; justify-content: center; flex-wrap: wrap; margin: 30px 0; }
        
        .card { 
            background: rgba(20, 20, 20, 0.9); border: 2px solid #444; 
            border-radius: 20px; padding: 20px; width: 300px; text-align: center;
        }
        .jedi-card:hover { border-color: #2e67f8; box-shadow: 0 0 30px #2e67f8; }
        .sith-card:hover { border-color: #f82e2e; box-shadow: 0 0 30px #f82e2e; }

        img.profile { width: 100%; height: 380px; object-fit: cover; border-radius: 10px; }
        
        button { 
            width: 100%; padding: 15px; margin-top: 15px; border: none; border-radius: 8px; 
            font-weight: bold; cursor: pointer; text-transform: uppercase; color: white;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.95); }
        .btn-jedi { background: #2e67f8; } 
        .btn-sith { background: #f82e2e; }
        
        .count { font-size: 3.5rem; font-weight: bold; font-family: monospace; margin-top: 10px; color: #ffe81f; }

        .footer { margin-top: auto; padding: 40px; text-align: center; width: 100%; background: rgba(0,0,0,0.85); border-top: 2px solid #ffe81f; }
        .qr-explosion { 
            display: inline-block; padding: 10px; background: white; border-radius: 10px; 
            box-shadow: 0 0 30px #ffe81f; animation: explode 1.5s infinite alternate; 
        }
        .qr-explosion img { width: 150px; height: 150px; }
        @keyframes explode { 0% { transform: scale(1); box-shadow: 0 0 20px #ffe81f; } 100% { transform: scale(1.1); box-shadow: 0 0 60px #ffe81f; } }
    </style>
</head>
<body>

    <h1>Choose Your Side & scroll down to vote</h1>

    <div class="main-stage">
        <div class="card jedi-card">
            <img src="Anakin_Skywalker_RotS.webp" class="profile">
            <h2>Jedi Order</h2>
            <button class="btn-jedi" onclick="castGlobalVote('jedi')">Light Side</button>
            <div id="jedi-count" class="count">0</div>
        </div>

        <div class="card sith-card">
            <img src="darth maul.webp" class="profile">
            <h2>Sith Lords</h2>
            <button class="btn-sith" onclick="castGlobalVote('sith')">Dark Side</button>
            <div id="sith-count" class="count">0</div>
        </div>
    </div>

    <div class="footer">
        <p style="color:#ffe81f; font-weight:bold; letter-spacing:2px; margin-bottom:15px;">SCAN TO JOIN THE COUNCIL</p>
        <div class="qr-explosion">
            <img src="council.png" alt="QR Code">
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, increment } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // PASTE YOUR ACTUAL CONFIG HERE
        const firebaseConfig = {
  apiKey: "AIzaSyAFtE1T-hN_FBK869KFgqKYKikM97mnR1E",
  authDomain: "sithorjedi-6a0f3.firebaseapp.com",
  databaseURL: "https://sithorjedi-6a0f3-default-rtdb.firebaseio.com",
  projectId: "sithorjedi-6a0f3",
  storageBucket: "sithorjedi-6a0f3.firebasestorage.app",
  messagingSenderId: "324066941075",
  appId: "1:324066941075:web:7d4e88b68e27049a28d566",
  measurementId: "G-QV1R8B3FL0"
};

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const votesRef = ref(db, 'Votes');

        // Sync UI with Database (Realtime)
        onValue(votesRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                document.getElementById('jedi-count').innerText = data.Jedi || 0;
                document.getElementById('sith-count').innerText = data.Sith || 0;
            }
        });

        // Vote Function
        window.castGlobalVote = function(side) {
            // Capitalize side to match your Firebase keys (Jedi/Sith)
            const dbKey = side.charAt(0).toUpperCase() + side.slice(1);
            
            update(votesRef, {
                [dbKey]: increment(1)
            }).catch(err => console.error("Error updating:", err));
        };
    </script>
</body>
</html>
