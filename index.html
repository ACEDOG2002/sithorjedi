<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sith vs Jedi: Hyperspace</title>
    <style>
        /* --- 1. HYPERSPACE BACKGROUND --- */
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #000;
            overflow-x: hidden;
            
            /* Moving Starfield */
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 3px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 2px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 3px);
            background-size: 550px 550px, 350px 350px, 250px 250px;
            background-position: 0 0, 40px 60px, 130px 270px;
            animation: hyperspace 8s linear infinite;
        }

        @keyframes hyperspace {
            from { background-position: 0 0, 40px 60px, 130px 270px; }
            to { background-position: 550px 550px, 390px 410px, 380px 520px; }
        }

        /* --- 2. HEADER & CARDS --- */
        h1 {
            color: #ffe81f;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin: 40px 0;
            text-shadow: 0 0 20px rgba(255, 232, 31, 0.8);
            text-align: center;
        }

        .main-stage {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            padding-bottom: 50px;
        }

        .card {
            background: rgba(20, 20, 20, 0.9);
            border: 2px solid #444;
            border-radius: 20px;
            padding: 20px;
            width: 300px;
            text-align: center;
            transition: 0.4s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        /* Side Glows */
        .jedi-card:hover { border-color: #2e67f8; box-shadow: 0 0 30px #2e67f8; }
        .sith-card:hover { border-color: #f82e2e; box-shadow: 0 0 30px #f82e2e; }

        img.profile {
            width: 100%;
            height: 380px;
            object-fit: cover;
            border-radius: 10px;
        }

        button {
            width: 100%;
            padding: 15px;
            margin: 15px 0;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            color: white;
        }

        .btn-jedi { background: #2e67f8; }
        .btn-sith { background: #f82e2e; }

        .count { font-size: 3rem; font-weight: bold; font-family: monospace; }

        /* --- 3. QR EXPLOSION FOOTER --- */
        .footer {
            margin-top: auto;
            padding: 40px;
            text-align: center;
            width: 100%;
            background: rgba(0,0,0,0.8);
            border-top: 1px solid #ffe81f;
        }

        .footer p {
            color: #ffe81f;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #ffe81f;
        }

        .qr-explosion {
            display: inline-block;
            position: relative;
            padding: 10px;
            background: white;
            border-radius: 10px;
            /* The Explosion Glow */
            box-shadow: 0 0 20px #ffe81f, 0 0 40px #ffae00;
            animation: pulse-explosion 1.5s infinite alternate;
        }

        .qr-explosion img {
            width: 150px;
            height: 150px;
            display: block;
        }

        @keyframes pulse-explosion {
            0% { transform: scale(1); box-shadow: 0 0 20px #ffe81f; }
            100% { transform: scale(1.1); box-shadow: 0 0 50px #ffe81f, 0 0 80px #ffae00; }
        }
    </style>
</head>
<body>

    <h1>Choose Your Alignment &
        scroll down
    </h1>

    <div class="main-stage">
        <div class="card jedi-card">
            <img src="Anakin_Skywalker_RotS.webp" alt="Anakin" class="profile">
            <h2>Jedi Order</h2>
            <button class="btn-jedi" onclick="castVote('jedi')">Light Side</button>
            <div id="jedi-count" class="count">0</div>
        </div>

        <div class="card sith-card">
            <img src="darth maul.webp" alt="Darth Maul" class="profile">
            <h2>Sith Lords</h2>
            <button class="btn-sith" onclick="castVote('sith')">Dark Side</button>
            <div id="sith-count" class="count">0</div>
        </div>
    </div>

    <div class="footer">
        <p>SCAN TO JOIN THE COUNCIL</p>
        <div class="qr-explosion">
            <img src="council.png" alt="QR Code">
        </div>
    </div>

    <script>
        // Use local memory to keep votes after refresh
        let votes = JSON.parse(localStorage.getItem('forceVotes')) || { jedi: 0, sith: 0 };

        function updateUI() {
            document.getElementById('jedi-count').innerText = votes.jedi;
            document.getElementById('sith-count').innerText = votes.sith;
        }

        function castVote(side) {
            votes[side]++;
            localStorage.setItem('forceVotes', JSON.stringify(votes));
            updateUI();
        }

        // Initialize display on load
        updateUI();
    </script>
</body>
</html>
