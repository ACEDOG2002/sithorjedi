<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sith vs Jedi: Global War</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* --- STYLING (Hyperspace + Explosion) --- */
        body {
            margin: 0; padding: 0; min-height: 100vh; color: white;
            font-family: 'Segoe UI', sans-serif; display: flex;
            flex-direction: column; align-items: center; background: #000;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 3px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 3px);
            background-size: 550px 550px, 350px 350px;
            animation: hyperspace 8s linear infinite;
        }
        @keyframes hyperspace { from { background-position: 0 0; } to { background-position: 550px 550px; } }
        
        h1 { color: #ffe81f; text-transform: uppercase; letter-spacing: 5px; text-shadow: 0 0 20px #ffe81f; margin-top: 40px; }
        
        .main-stage { display: flex; gap: 30px; justify-content: center; flex-wrap: wrap; margin: 30px 0; }
        
        .card { 
            background: rgba(20, 20, 20, 0.9); border: 2px solid #444; 
            border-radius: 20px; padding: 20px; width: 300px; text-align: center;
        }
        .jedi-card:hover { border-color: #2e67f8; box-shadow: 0 0 30px #2e67f8; }
        .sith-card:hover { border-color: #f82e2e; box-shadow: 0 0 30px #f82e2e; }

        img.profile { width: 100%; height: 380px; object-fit: cover; border-radius: 10px; }
        
        button { 
            width: 100%; padding: 15px; margin-top: 15px; border: none; border-radius: 8px; 
            font-weight: bold; cursor: pointer; text-transform: uppercase; color: white;
        }
        .btn-jedi { background: #2e67f8; } .btn-sith { background: #f82e2e; }
        .count { font-size: 3rem; font-weight: bold; font-family: monospace; margin-top: 10px; }

        /* QR FOOTER */
        .footer { margin-top: auto; padding: 40px; text-align: center; width: 100%; background: rgba(0,0,0,0.85); border-top: 2px solid #ffe81f; }
        .qr-explosion { 
            display: inline-block; padding: 10px; background: white; border-radius: 10px; 
            box-shadow: 0 0 30px #ffe81f; animation: explode 1.5s infinite alternate; 
        }
        .qr-explosion img { width: 150px; height: 150px; }
        @keyframes explode { 0% { transform: scale(1); box-shadow: 0 0 20px #ffe81f; } 100% { transform: scale(1.1); box-shadow: 0 0 60px #ffe81f; } }
    </style>
</head>
<body>

    <h1>Choose your side & scroll down</h1>

    <div class="main-stage">
        <div class="card jedi-card">
            <img src="Anakin_Skywalker_RotS.webp" class="profile">
            <h2>Jedi Order</h2>
            <button class="btn-jedi" onclick="castVote('jedi')">Light Side</button>
            <div id="jedi-count" class="count">...</div>
        </div>

        <div class="card sith-card">
            <img src="darth maul.webp" class="profile">
            <h2>Sith Lords</h2>
            <button class="btn-sith" onclick="castVote('sith')">Dark Side</button>
            <div id="sith-count" class="count">...</div>
        </div>
    </div>

    <div class="footer">
        <p style="color:#ffe81f; font-weight:bold; letter-spacing:2px;">SCAN TO JOIN THE COUNCIL</p>
        <div class="qr-explosion">
            <img src="council.png" alt="QR Code">
        </div>
    </div>

    <script>
        // --- SUPABASE CONFIG ---
        const _supabaseUrl = 'YOUR_SUPABASE_URL';
        const _supabaseKey = 'YOUR_SUPABASE_ANON_KEY';
        const supabase = supabase.createClient(_supabaseUrl, _supabaseKey);

        // 1. Fetch Global Votes
        async function fetchVotes() {
            const { data, error } = await supabase.from('votes').select('*');
            if (data) {
                data.forEach(row => {
                    document.getElementById(`${row.side}-count`).innerText = row.count;
                });
            }
        }

        // 2. Cast Global Vote
        async function castVote(side) {
            // Optimistic update (optional UI feedback)
            const el = document.getElementById(`${side}-count`);
            el.innerText = parseInt(el.innerText) + 1;

            // Call the SQL function we created in Supabase
            await supabase.rpc('increment_vote', { row_side: side });
        }

        // 3. REAL-TIME SYNC
        // This makes the numbers jump when anyone else in the world votes
        supabase
          .channel('schema-db-changes')
          .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'votes' }, (payload) => {
             fetchVotes();
          })
          .subscribe();

        // Initial Load
        fetchVotes();
    </script>
</body>
</html>
